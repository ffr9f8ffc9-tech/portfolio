<!DOCTYPE html>

<head>

    <title>Sofia Sekssaoui | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f5f5f5; color: #111; overflow: hidden; height: 100vh; perspective: 1000px; margin: 0; padding: 0; }
        
        /* 1. ANIMATION DES IMAGES (ORBIT) */
        /* Les images tournent en rond autour du centre */
        .orbit-container {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            z-index: 1;
            /* L'animation globale de rotation */
            animation: spin 60s linear infinite;
        }

        .orbit-img { 
            position: absolute;
            border-radius: 32px; 
            overflow: hidden; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            will-change: transform;
            /* On annule la rotation du parent pour que l'image reste droite */
            animation: anti-spin 60s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
        @keyframes anti-spin {
            100% { transform: rotate(-360deg); }
        }

        /* 2. ANIMATION 3D DU TEXTE */
        .text-container {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100%; text-align: center;
            z-index: 10;
        }
        .slide {
            position: absolute; top: 50%; left: 50%;
            width: 100%;
            transform: translate(-50%, -50%) rotateX(-90deg);
            opacity: 0;
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
            transform-style: preserve-3d;
            pointer-events: none;
        }
        .slide.active {
            transform: translate(-50%, -50%) rotateX(0deg);
            opacity: 1;
            pointer-events: auto;
        }
        .slide.exit {
            transform: translate(-50%, -50%) rotateX(90deg);
            opacity: 0;
        }

        /* 3. STYLE DES PILULES */
        .pill-nav { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(20px); border-radius: 999px; padding: 6px 20px; border: 1px solid rgba(0,0,0,0.05); }
        .huge-text { font-size: clamp(3rem, 9vw, 110px); line-height: 0.85; font-weight: 800; letter-spacing: -0.05em; }
    </style>
</head>

    <div class="fixed bottom-8 right-8 text-[12px] font-bold uppercase tracking-widest opacity-40">©2026</div>

    <script>
        const slides = document.querySelectorAll('.slide');
        let current = 0;

        setInterval(() => {
            slides[current].classList.remove('active');
            slides[current].classList.add('exit');
            
            let prev = current;
            current = (current + 1) % slides.length;
            
            slides[current].classList.remove('exit'); 
            slides[current].classList.add('active');
            
            setTimeout(() => {
                slides[prev].classList.remove('exit');
            }, 1000); 
        }, 4000); 
    </script>
