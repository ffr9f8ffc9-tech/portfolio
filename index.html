<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofia Sekssaoui | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f6f6f6; color: #1a1a1a; overflow: hidden; height: 100vh; }
        
        /* Conteneur pour les images flottantes */
        .floating-img { 
            position: absolute; 
            border-radius: 32px; 
            overflow: hidden; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.08); 
            will-change: transform;
            z-index: 5;
        }

        /* --- ANIMATIONS DE FLOTTEMENT PRÉCISES --- */
        @keyframes float-1 { 
            0%, 100% { transform: translate(0, 0) rotate(-6deg); } 
            50% { transform: translate(-20px, 15px) rotate(-4deg); } 
        }
        @keyframes float-2 { 
            0%, 100% { transform: translate(0, 0) rotate(4deg); } 
            50% { transform: translate(15px, -20px) rotate(6deg); } 
        }
        @keyframes float-3 { 
            0%, 100% { transform: translate(0, 0) rotate(3deg); } 
            50% { transform: translate(10px, 20px) rotate(1deg); } 
        }
        @keyframes float-4 { 
            0%, 100% { transform: translate(0, 0) rotate(-4deg); } 
            50% { transform: translate(-15px, -15px) rotate(-6deg); } 
        }
        @keyframes float-5 { 
            0%, 100% { transform: translate(0, 0) rotate(0deg); } 
            50% { transform: translate(0px, -25px) rotate(2deg); } 
        }

        /* Application des positions et des durées (désynchronisées pour le naturel) */
        .img-1 { top: 10%; left: 6%; width: 260px; height: 180px; animation: float-1 8s ease-in-out infinite; }
        .img-2 { top: 6%; right: 10%; width: 220px; height: 280px; animation: float-2 10s ease-in-out infinite; }
        .img-3 { bottom: 10%; left: 10%; width: 180px; height: 220px; animation: float-3 9s ease-in-out infinite; }
        .img-4 { bottom: 6%; right: 16%; width: 240px; height: 240px; animation: float-4 11s ease-in-out infinite; }
        .img-5 { bottom: 4%; left: 46%; width: 140px; height: 180px; animation: float-5 7s ease-in-out infinite; }

        /* --- TEXTE CENTRAL --- */
        .text-container { text-align: center; z-index: 10; position: relative; }
        .dynamic-wrapper { height: 140px; overflow: hidden; display: block; }
        .word-stack { transition: transform 0.9s cubic-bezier(0.76, 0, 0.24, 1); }
        .word { display: block; height: 140px; font-size: 130px; line-height: 140px; font-weight: 800; letter-spacing: -0.05em; }

        /* Menu Style Pill (Comme ta vidéo) */
        .pill-nav { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); border-radius: 999px; padding: 6px 20px; border: 1px solid rgba(0,0,0,0.03); }
    </style>
</head>
<body class="flex items-center justify-center">

    <nav class="fixed top-8 right-8 z-50 flex items-center gap-4">
        <div class="pill-nav flex gap-6 text-[10px] font-bold uppercase tracking-widest text-gray-400">
            <a href="projets.html" class="hover:text-black transition-colors">Works</a>
            <a href="experience.html" class="hover:text-black transition-colors">Blog</a>
        </div>
        <a href="mailto:sofiasekssaoui@gmail.com" class="bg-black text-white px-8 py-4 rounded-full text-[10px] font-bold uppercase tracking-widest hover:scale-105 transition-all">Contact</a>
    </nav>

    <div class="img-1 floating-img"><img src="https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=600" class="w-full h-full object-cover"></div>
    <div class="img-2 floating-img"><img src="https://images.unsplash.com/photo-1518770660439-4636190af475?w=600" class="w-full h-full object-cover"></div>
    <div class="img-3 floating-img"><img src="https://images.unsplash.com/photo-1485827404703-89b55fcc595e?w=600" class="w-full h-full object-cover"></div>
    <div class="img-4 floating-img"><img src="https://images.unsplash.com/photo-1555664424-778a1e5e1b48?w=600" class="w-full h-full object-cover"></div>
    <div class="img-5 floating-img"><img src="sofia.jpg" class="w-full h-full object-cover grayscale"></div>

    <div class="text-container">
        <div class="dynamic-wrapper">
            <div id="word-stack" class="word-stack">
                <span class="word">Systems</span>
                <span class="word">Hardware</span>
                <span class="word">Websites</span>
                <span class="word">Apps</span>
            </div>
        </div>
        <h2 class="text-[130px] font-light italic text-gray-200 leading-[0.8] mt-[-10px] tracking-tighter">that perform</h2>
        <p class="text-[12px] font-bold uppercase tracking-[0.6em] mt-12 text-gray-400">Sofia SEKSSAOUI</p>
        <a href="projets.html" class="mt-12 bg-black text-white px-12 py-6 rounded-full text-[11px] font-bold uppercase tracking-widest inline-block hover:shadow-xl transition-all">Learn more</a>
    </div>

    <div class="fixed bottom-10 left-10 flex items-center gap-3 text-[10px] font-bold uppercase tracking-widest text-gray-300">
        <span class="w-1.5 h-1.5 bg-green-400 rounded-full animate-pulse"></span> Montpellier, FR
    </div>
    <div class="fixed bottom-10 right-10 text-[10px] font-bold uppercase tracking-widest text-gray-300">©2026</div>

    <script>
        // Animation du texte qui défile verticalement
        let currentWord = 0;
        const stack = document.getElementById('word-stack');
        setInterval(() => {
            currentWord = (currentWord + 1) % 4;
            stack.style.transform = `translateY(-${currentWord * 140}px)`;
        }, 3000);
    </script>
</body>
</html>
