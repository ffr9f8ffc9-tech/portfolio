<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofia Sekssaoui | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f6f6f6; color: #1a1a1a; overflow: hidden; }
        
        /* Floating Images */
        .floating-img { position: absolute; border-radius: 24px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.08); transition: transform 0.5s ease; }
        .floating-img:hover { transform: scale(1.05) translateY(-10px); }
        
        /* Positions des images comme sur ta vidéo */
        .img-1 { top: 15%; left: 5%; width: 220px; height: 160px; transform: rotate(-5deg); }
        .img-2 { top: 10%; right: 10%; width: 180px; height: 240px; transform: rotate(3deg); }
        .img-3 { bottom: 15%; left: 10%; width: 140px; height: 180px; transform: rotate(2deg); }
        .img-4 { bottom: 10%; right: 15%; width: 200px; height: 200px; transform: rotate(-3deg); }
        .img-center-low { bottom: 5%; left: 50%; transform: translateX(-50%); width: 120px; height: 160px; }

        /* Text Animation Logic */
        .word-flicker { display: inline-block; animation: flicker 3s infinite; }
        @keyframes flicker {
            0%, 20% { opacity: 0; transform: translateY(10px); }
            25%, 75% { opacity: 1; transform: translateY(0); }
            80%, 100% { opacity: 0; transform: translateY(-10px); }
        }

        /* Menu Style Pill */
        .pill-nav { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(15px); border-radius: 999px; padding: 8px 24px; border: 1px solid rgba(0,0,0,0.05); }
    </style>
</head>
<body class="h-screen flex items-center justify-center">

    <nav class="fixed top-8 right-8 z-50 flex items-center gap-4">
        <div class="pill-nav flex gap-8 text-[11px] font-bold uppercase tracking-widest">
            <a href="projets.html" class="hover:opacity-50">Works</a>
            <a href="experience.html" class="hover:opacity-50">Blog</a>
        </div>
        <a href="mailto:sofiasekssaoui@gmail.com" class="bg-black text-white px-8 py-4 rounded-full text-[11px] font-bold uppercase tracking-widest">Contact</a>
    </nav>

    <div class="img-1 floating-img bg-gray-200"><img src="https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&q=80&w=400" class="w-full h-full object-cover"></div>
    <div class="img-2 floating-img bg-gray-300"><img src="https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&q=80&w=400" class="w-full h-full object-cover"></div>
    <div class="img-3 floating-img bg-gray-400"><img src="https://images.unsplash.com/photo-1485827404703-89b55fcc595e?auto=format&fit=crop&q=80&w=400" class="w-full h-full object-cover"></div>
    <div class="img-4 floating-img bg-gray-500"><img src="https://images.unsplash.com/photo-1555664424-778a1e5e1b48?auto=format&fit=crop&q=80&w=400" class="w-full h-full object-cover"></div>
    <div class="img-center-low floating-img bg-gray-600"><img src="sofia.jpg" class="w-full h-full object-cover grayscale"></div>

    <div class="text-center z-10">
        <h2 class="text-[120px] font-extrabold tracking-tighter leading-none mb-4">
            <span id="dynamic-word" class="word-flicker">Systems</span> <br>
            <span class="text-gray-300 italic font-light">that perform</span>
        </h2>
        <p class="text-[13px] font-bold uppercase tracking-[0.4em] mb-10">Sofia SEKSSAOUI</p>
        <a href="projets.html" class="bg-black text-white px-12 py-6 rounded-full text-[11px] font-bold uppercase tracking-widest hover:scale-105 transition-transform inline-block">Learn more</a>
    </div>

    <div class="fixed bottom-8 left-8 flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest opacity-30">
        <span class="w-2 h-2 bg-green-500 rounded-full"></span> Montpellier, FR
    </div>
    <div class="fixed bottom-8 right-8 text-[10px] font-bold uppercase tracking-widest opacity-30">
        ©2026
    </div>

    <script>
        const words = ["Systems", "Hardware", "Websites", "Apps"];
        let i = 0;
        const wordEl = document.getElementById('dynamic-word');

        setInterval(() => {
            i = (i + 1) % words.length;
            wordEl.textContent = words[i];
        }, 3000);

        // Effet de parallaxe léger sur les images avec la souris
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            document.querySelectorAll('.floating-img').forEach(img => {
                img.style.transform += ` translate(${moveX}px, ${moveY}px)`;
            });
        });
    </script>
</body>
</html>
