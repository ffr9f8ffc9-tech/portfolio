    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f5f5f5; color: #111; overflow: hidden; height: 100vh; perspective: 1000px; }
        
        /* 1. ANIMATION DES IMAGES (INFINITE DRIFT) */
        .drift-img { 
            position: absolute; top: 0; left: 0;
            border-radius: 32px; 
            overflow: hidden; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            will-change: transform;
            animation: drift var(--dur) linear infinite;
            animation-delay: var(--delay);
            z-index: 1;
        }
        @keyframes drift {
            0% { transform: translateY(120vh) rotate(var(--r1)); }
            100% { transform: translateY(-100vh) rotate(var(--r2)); }
        }

        /* 2. ANIMATION 3D DU TEXTE */
        .text-container {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100%; text-align: center;
            z-index: 10;
        }
        .slide {
            position: absolute; top: 50%; left: 50%;
            width: 100%;
            transform: translate(-50%, -50%) rotateX(-90deg);
            opacity: 0;
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
            transform-style: preserve-3d;
            pointer-events: none;
        }
        .slide.active {
            transform: translate(-50%, -50%) rotateX(0deg);
            opacity: 1;
            pointer-events: auto;
        }
        .slide.exit {
            transform: translate(-50%, -50%) rotateX(90deg);
            opacity: 0;
        }

        /* 3. STYLE DES PILULES */
        .pill-nav { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(20px); border-radius: 999px; padding: 6px 20px; border: 1px solid rgba(0,0,0,0.05); }
        .huge-text { font-size: clamp(4rem, 11vw, 130px); line-height: 0.85; font-weight: 800; letter-spacing: -0.05em; }
    </style>
</head>

    <script>
        const slides = document.querySelectorAll('.slide');
        let current = 0;

        setInterval(() => {
            // L'ancien slide sort vers le haut
            slides[current].classList.remove('active');
            slides[current].classList.add('exit');
            
            let prev = current;
            current = (current + 1) % slides.length;
            
            // Le nouveau slide entre par le bas
            slides[current].classList.remove('exit'); 
            slides[current].classList.add('active');
            
            // Nettoyage de la classe exit après la fin de l'animation
            setTimeout(() => {
                slides[prev].classList.remove('exit');
            }, 1000); 
        }, 3500); // Change toutes les 3.5 secondes
    </script>
